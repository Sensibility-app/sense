<!DOCTYPE html>
<html>
<head>
  <title>Generate Sense Icons</title>
  <style>
    body {
      font-family: system-ui;
      padding: 20px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    canvas {
      border: 1px solid #3e3e42;
      margin: 10px;
    }
    button {
      background: #0e639c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }
    button:hover {
      background: #1177bb;
    }
    .container {
      max-width: 600px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Generate Sense App Icons</h1>
    <p>Click the buttons below to download the app icons:</p>

    <canvas id="canvas192" width="192" height="192"></canvas>
    <button onclick="downloadIcon(192)">Download 192x192 Icon</button>

    <br>

    <canvas id="canvas512" width="512" height="512"></canvas>
    <button onclick="downloadIcon(512)">Download 512x512 Icon</button>

    <p style="margin-top: 20px; color: #858585; font-size: 12px;">
      Save these as icon-192.png and icon-512.png in the client/ directory
    </p>
  </div>

  <script>
    function drawIcon(size) {
      const canvas = document.getElementById(`canvas${size}`);
      const ctx = canvas.getContext('2d');

      // Background
      ctx.fillStyle = '#1e1e1e';
      ctx.fillRect(0, 0, size, size);

      // Draw "S" for Sense
      ctx.fillStyle = '#4ec9b0';
      ctx.font = `bold ${size * 0.6}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('S', size / 2, size / 2);

      // Border
      ctx.strokeStyle = '#4ec9b0';
      ctx.lineWidth = size * 0.02;
      ctx.strokeRect(size * 0.1, size * 0.1, size * 0.8, size * 0.8);
    }

    function downloadIcon(size) {
      const canvas = document.getElementById(`canvas${size}`);
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Draw icons on load
    drawIcon(192);
    drawIcon(512);
  </script>
</body>
</html>
