<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- Mobile theme colors -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <title>Sense - Agent-First Development</title>
  <link rel="stylesheet" href="/client/styles.css">
</head>
<body>
  <header>
    <h1>Sense</h1>
    <div class="header-info">
      <div id="tokenInfo" class="status" style="display: none;"></div>
      <div class="status reconnecting" id="status">Connecting...</div>
    </div>
  </header>

  <main>
    <div class="output" id="output">
    </div>
  </main>

  <div class="input-area">
    <div class="task-input-wrapper">
      <textarea id="taskInput" placeholder="Ask me anything..." autofocus></textarea>
      <button id="submitBtn">↑</button>
      <button id="stopBtn" style="display: none;">■</button>
    </div>
  </div>

  <!-- Load marked.js with preconnect for faster CDN access -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" defer></script>

  <script type="module" src="/client/app.ts"></script>
</body>
</html>
