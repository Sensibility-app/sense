<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sense - Agent-First Development</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
      font-size: 14px;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #252526;
      padding: 12px 20px;
      border-bottom: 1px solid #3e3e42;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #cccccc;
    }

    .status {
      font-size: 12px;
      color: #858585;
    }

    .status.connected {
      color: #4ec9b0;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .output {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #1e1e1e;
    }

    .log-entry {
      margin-bottom: 8px;
      padding: 4px 8px;
      border-radius: 3px;
    }

    .log-entry.info {
      color: #d4d4d4;
    }

    .log-entry.error {
      color: #f48771;
      background: #5a1d1d;
    }

    .log-entry.success {
      color: #4ec9b0;
    }

    .log-entry.action {
      color: #569cd6;
      font-style: italic;
    }

    .log-entry.tool {
      color: #ce9178;
      border-left: 3px solid #ce9178;
      padding-left: 8px;
    }

    .diff-view {
      background: #252526;
      border: 1px solid #3e3e42;
      border-radius: 4px;
      padding: 12px;
      margin: 8px 0;
      white-space: pre-wrap;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
    }

    .diff-view .added {
      color: #4ec9b0;
    }

    .diff-view .removed {
      color: #f48771;
    }

    .input-area {
      border-top: 1px solid #3e3e42;
      background: #252526;
      padding: 16px;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      background: #0e639c;
      color: #ffffff;
      border: none;
      padding: 6px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }

    button:hover {
      background: #1177bb;
    }

    button:disabled {
      background: #3e3e42;
      color: #858585;
      cursor: not-allowed;
    }

    button.secondary {
      background: #3e3e42;
    }

    button.secondary:hover {
      background: #505050;
    }

    .task-input-wrapper {
      display: flex;
      gap: 8px;
    }

    textarea {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #3e3e42;
      color: #d4d4d4;
      padding: 8px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
      min-height: 60px;
    }

    textarea:focus {
      outline: none;
      border-color: #0e639c;
    }

    .working {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #3e3e42;
      border-top-color: #0e639c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Sense</h1>
    <div class="status" id="status">Disconnected</div>
  </header>

  <main>
    <div class="output" id="output">
      <div class="log-entry info">Welcome to Sense. Connected to server, ready for tasks.</div>
    </div>

    <div class="input-area">
      <div class="controls">
        <button class="secondary" id="statusBtn">Git Status</button>
        <button class="secondary" id="diffBtn">Git Diff</button>
      </div>
      <div class="task-input-wrapper">
        <textarea id="taskInput" placeholder="Enter a task for the agent..."></textarea>
        <button id="submitBtn">Run</button>
      </div>
    </div>
  </main>

  <script type="module" src="/client/client.js"></script>
</body>
</html>
